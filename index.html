<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчальний центр: Мінна безпека</title>
    <style>
        :root { --primary: #1e3a8a; --secondary: #3b82f6; --success: #16a34a; --error: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 650px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-train { background: #e2e8f0; color: #475569; }
        .btn-exam { background: var(--primary); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .question-box { display: none; }
        .active { display: block; }
        .option { padding: 15px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .option:hover:not(.locked) { background: #f1f5f9; border-color: #cbd5e1; }
        .option.correct { background: #dcfce7; border-color: var(--success); color: #166534; }
        .option.wrong { background: #fee2e2; border-color: var(--error); color: #991b1b; }
        .locked { cursor: default; }
        .explanation { margin-top: 15px; padding: 15px; background: #eff6ff; border-left: 4px solid var(--secondary); border-radius: 4px; font-size: 0.9rem; display: none; }
        .progress-container { height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        #result-screen { text-align: center; display: none; }
        .score-text { font-size: 3rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="active">
        <div class="header">
            <h1>Тестування: Гранати та міни</h1>
            <p>Введіть дані та оберіть режим:</p>
        </div>
        <input type="text" id="user-name" placeholder="Ваше Прізвище та Ім'я" style="width:100%; padding:12px; margin-bottom:15px; border:2px solid #e2e8f0; border-radius:8px; box-sizing:border-box;">
        <div class="mode-selector">
            <button class="btn btn-train" onclick="initQuiz('training')">🚀 ТРЕНУВАННЯ<br><small>З підказками</small></button>
            <button class="btn btn-exam" onclick="initQuiz('exam')">📝 ЗАЛІК<br><small>На оцінку</small></button>
        </div>
    </div>

    <div id="quiz-screen" class="question-box">
        <div class="progress-container"><div class="progress-fill" id="progress"></div></div>
        <div id="q-number" style="color:#64748b; font-size:0.9rem; margin-bottom:10px;"></div>
        <h2 id="q-text" style="margin-bottom:20px; font-size:1.2rem;"></h2>
        <div id="options-container"></div>
        <div id="explanation" class="explanation"></div>
        <button id="next-btn" class="btn btn-exam" style="margin-top:20px; display:none;" onclick="loadNext()">Наступне питання →</button>
        <button class="btn btn-train" style="margin-top:10px; width:100%; font-size:0.8rem;" onclick="resetToMenu()">↩ Перервати та вийти в меню</button>
    </div>

    <div id="result-screen">
        <h2 id="res-title">Результати</h2>
        <p id="res-user"></p>
        <div class="score-text" id="res-score"></div>
        <p id="res-info"></p>
        <button class="btn btn-train" onclick="resetToMenu()">Повернутися в меню</button>
    </div>
</div>

<script>
const baseQuestions = [
    { q: "Що утримує вибухову речовину та формує забійні осколки?", a: ["Запал", "Корпус", "Спусковий важіль"], c: 1, e: "Корпус — це металева оболонка, яка при вибуху розривається на уламки." },
    { q: "Яка речовина найчастіше використовується як основний заряд?", a: ["Порох", "Пластид", "Тротил"], c: 2, e: "Тротил (ТНТ) — основна вибухова речовина більшості боєприпасів." },
    { q: "До якого типу належать РГД-5 та РГН?", a: ["Наступальні", "Оборонні", "Термобаричні"], c: 0, e: "РГД-5 — наступальна, бо має невеликий радіус розльоту осколків." },
    { q: "Звідки дозволяється кидати оборонні гранати (Ф-1)?", a: ["На ходу", "Тільки з укриття", "З будь-якого місця"], c: 1, e: "Оборонні гранати мають великий радіус ураження, тому укриття обов'язкове." },
    { q: "Радіус ураження осколками наступальної гранати?", a: ["до 10 м", "до 25 м", "до 200 м"], c: 1, e: "Зазвичай до 25 метрів, що менше за дальність кидка." },
    { q: "Радіус ураження осколками оборонної гранати?", a: ["до 50 м", "до 100 м", "до 200 м"], c: 2, e: "Окремі осколки Ф-1 летять до 200 метрів." },
    { q: "Яка середня вага оборонної гранати (Ф-1)?", a: ["~310 г", "530-600 г", "понад 1 кг"], c: 1, e: "Оборонні гранати важчі через товстий чавунний корпус." },
    { q: "Середня дальність кидка наступальної гранати?", a: ["20-30 м", "40-50 м", "70-80 м"], c: 1, e: "40-50 метрів — стандарт для підготовленого бійця." },
    { q: "З якого моменту починається запуск підривника?", a: ["Після висмикування чеки", "Після відпускання важеля в польоті", "Після удару об землю"], c: 1, e: "Ударник б'є по капсулю лише тоді, коли важіль відлітає від корпусу." },
    { q: "Затримка запалу УЗРГМ до детонації?", a: ["1,5 – 2 сек", "3,2 – 4,2 сек", "5 – 6 сек"], c: 1, e: "Стандартний час для безпечного польоту гранати." },
    { q: "Ефект фугасних протипіхотних мін?", a: ["Вибухова хвиля (травми ніг)", "Кругове осколкове ураження", "Секторне ураження"], c: 0, e: "Фугасна міна (як ПМН) розрахована на пошкодження стопи вибухом." },
    { q: "Зусилля спрацювання міни ПМН-2?", a: ["1-2 кг", "5-25 кг", "понад 50 кг"], c: 1, e: "Це відповідає вазі наступу людини." },
    { q: "Міна, яку діти сприймають як іграшку?", a: ["ПМН-2", "ОЗМ-72", "ПФМ-1 («Пелюстка»)"], c: 2, e: "Пластикова форма та крило роблять її схожою на іграшку." },
    { q: "Механізм дії ОЗМ-72 («Міна-жаба»)?", a: ["Вибух під землею", "Вистрибує на 90-110 см", "Димова завісу"], c: 1, e: "Вона вистрибує, щоб осколки летіли горизонтально на рівні тіла." },
    { q: "Радіус суцільного ураження ОЗМ-72?", a: ["5-10 м", "25-30 м", "100-150 м"], c: 1, e: "У межах 30 метрів ураження майже 100%." },
    { q: "Кількість елементів у міні ОЗМ-72?", a: ["500", "1000", "2400"], c: 2, e: "Всередині 2400 готових роликів або кульок." },
    { q: "Особливість мін МОН-50 та МОН-90?", a: ["Кругове ураження", "Спрямована дія (сектор)", "Безпечність"], c: 1, e: "Вони вражають ворога в межах певного кута (сектору)." },
    { q: "Перший крок при виявленні ВНП?", a: ["Побігти назад", "Зупинитись (Замри)", "Сфотографувати"], c: 1, e: "Головне — не зробити крок на іншу міну чи розтяжку." },
    { q: "Мінімальна відстань відходу від ВНП?", a: ["10 м", "50 м", "100 м"], c: 2, e: "100 метрів — безпечна зона для більшості боєприпасів." },
    { q: "Номери для повідомлення про міну?", a: ["103 / 104", "101 / 102", "112 / 103"], c: 1, e: "ДСНС (101) та Поліція (102)." },
    { q: "Що ЗАБОРОНЕНО робити з боєприпасом?", a: ["Позначати місце", "Відходити", "Торкатися / заливати водою"], c: 2, e: "Будь-який вплив може спровокувати детонацію." },
    { q: "Одяг, який не можна носити цивільним?", a: ["Яскравий", "Мілітарі / Форма", "Темний"], c: 1, e: "Військовий стиль робить вас ціллю для снайпера чи артилерії." },
    { q: "Об'єм рюкзака «Екстреної валізи»?", a: ["10 л", "25 л", "100 л"], c: 1, e: "25 літрів — достатньо для необхідного на 72 години." },
    { q: "Безпечна відстань («зона життя»)?", a: ["50 м", "100 м", "300 м"], c: 2, e: "300 метрів — рекомендована дистанція для повної безпеки." }
];

let currentMode = '';
let currentIdx = 0;
let score = 0;
let userName = '';
let activeQuestions = [];

function initQuiz(mode) {
    userName = document.getElementById('user-name').value.trim();
    if (!userName) return alert("Будь ласка, введіть ім'я");
    
    if (mode === 'exam' && localStorage.getItem('exam_done')) {
        alert("Залік уже складено!");
        showFinal(JSON.parse(localStorage.getItem('exam_done')));
        return;
    }

    // Скидаємо все при кожному старті
    currentMode = mode;
    currentIdx = 0;
    score = 0;
    // Перемішуємо питання при кожному вході в будь-який режим
    activeQuestions = [...baseQuestions].sort(() => Math.random() - 0.5);

    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').classList.add('active');
    loadQuestion();
}

function loadQuestion() {
    const q = activeQuestions[currentIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('q-number').innerText = `Питання ${currentIdx + 1} / ${activeQuestions.length} [Режим: ${currentMode === 'exam' ? 'ЗАЛІК' : 'ТРЕНУВАННЯ'}]`;
    document.getElementById('progress').style.width = `${(currentIdx / activeQuestions.length) * 100}%`;
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    q.a.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = text;
        div.onclick = () => selectOption(i, div);
        container.appendChild(div);
    });
}

function selectOption(idx, el) {
    const q = activeQuestions[currentIdx];
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.add('locked'));
    
    if (idx === q.c) {
        el.classList.add('correct');
        score++;
    } else {
        el.classList.add('wrong');
        options[q.c].classList.add('correct');
    }

    if (currentMode === 'training') {
        const exp = document.getElementById('explanation');
        exp.innerText = q.e;
        exp.style.display = 'block';
    }
    document.getElementById('next-btn').style.display = 'block';
}

function loadNext() {
    currentIdx++;
    if (currentIdx < activeQuestions.length) {
        loadQuestion();
    } else {
        const result = { name: userName, score: `${score}/${activeQuestions.length}`, mode: currentMode };
        if (currentMode === 'exam') localStorage.setItem('exam_done', JSON.stringify(result));
        showFinal(result);
    }
}

function showFinal(data) {
    document.getElementById('quiz-screen').classList.remove('active');
    document.getElementById('start-screen').classList.remove('active');
    const screen = document.getElementById('result-screen');
    screen.style.display = 'block';
    document.getElementById('res-user').innerText = `Учень: ${data.name}`;
    document.getElementById('res-score').innerText = data.score;
    document.getElementById('res-info').innerText = `Режим: ${data.mode === 'exam' ? 'Офіційний залік' : 'Тренування'}`;
}

function resetToMenu() {
    // Повний ресет стану
    currentIdx = 0;
    score = 0;
    document.getElementById('quiz-screen').classList.remove('active');
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('start-screen').classList.add('active');
}
</script>
</body>
</html>
