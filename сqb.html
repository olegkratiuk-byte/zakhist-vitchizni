<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQB: Геометрія виживання</title>
    <style>
        :root { --primary: #1f2937; --secondary: #4b5563; --success: #059669; --error: #dc2626; --bg: #f3f4f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 650px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-train { background: #e2e8f0; color: #475569; }
        .btn-exam { background: var(--primary); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .question-box { display: none; }
        .active { display: block; }
        .option { padding: 15px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .option:hover:not(.locked) { background: #f1f5f9; border-color: #cbd5e1; }
        .option.correct { background: #dcfce7; border-color: var(--success); color: #065f46; }
        .option.wrong { background: #fee2e2; border-color: var(--error); color: #991b1b; }
        .locked { cursor: default; }
        .explanation { margin-top: 15px; padding: 15px; background: #f0fdf4; border-left: 4px solid var(--success); border-radius: 4px; font-size: 0.9rem; display: none; color: #166534; }
        .progress-container { height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        #result-screen { text-align: center; display: none; }
        .score-text { font-size: 3rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="active">
        <div class="header">
            <h1>🏘️ Тактика CQB: 11 Клас</h1>
            <p>Геометрія виживання та робота в будівлях</p>
        </div>
        <input type="text" id="user-name" placeholder="Прізвище та Ім'я учня" style="width:100%; padding:12px; margin-bottom:15px; border:2px solid #e2e8f0; border-radius:8px; box-sizing:border-box;">
        <div class="mode-selector">
            <button class="btn btn-train" onclick="initQuiz('training')">🚀 ТРЕНУВАННЯ<br><small>З поясненнями</small></button>
            <button class="btn btn-exam" onclick="initQuiz('exam')">📝 ЗАЛІК<br><small>Контрольна спроба</small></button>
        </div>
    </div>

    <div id="quiz-screen" class="question-box">
        <div class="progress-container"><div class="progress-fill" id="progress"></div></div>
        <div id="q-number" style="color:#64748b; font-size:0.8rem; font-weight: bold; margin-bottom:10px; text-transform: uppercase;"></div>
        <h2 id="q-text" style="margin-bottom:20px; font-size:1.2rem; line-height: 1.4;"></h2>
        <div id="options-container"></div>
        <div id="explanation" class="explanation"></div>
        <button id="next-btn" class="btn btn-exam" style="margin-top:20px; display:none; width: 100%;" onclick="loadNext()">Далі →</button>
    </div>

    <div id="result-screen">
        <h2 id="res-title">Результат зафіксовано</h2>
        <p id="res-user" style="font-size: 1.1rem; font-weight: bold;"></p>
        <div class="score-text" id="res-score"></div>
        <p id="res-info" style="color: #64748b;"></p>
        <button class="btn btn-train" onclick="location.reload()" style="width: 100%; margin-top: 20px;">На головну</button>
    </div>
</div>

<script>
const baseQuestions = [
    { q: "Яка головна мета тактики CQB згідно з правилами 'геометрії виживання'?", a: ["Блискавичний штурм та рефлекторна стрілянина", "Поступове проникнення та мінімізація неперевірених кутів", "Одночасне потрапляння в поле зору всіх кутів кімнати"], c: 1, e: "Мета — не швидкість заради швидкості, а контроль простору з мінімальним ризиком." },
    { q: "Чому підхід до дверей зі 'слабкої сторони' (Weak Side) є тактично вигіднішим?", a: ["Він затримує момент вашого виявлення і дає критичні секунди на реакцію", "Він дозволяє миттєво виявити ціль та одразу відкрити вогонь", "Він дає змогу швидко вибити двері ногою"], c: 0, e: "Слабка сторона приховує ваш силует довше, даючи перевагу в часі." },
    { q: "Яка архітектурна форма кімнати несе найвищий ризик дружнього вогню (friendly fire)?", a: ["Квадратна", "Г-подібна", "Видовжена / лінійна"], c: 2, e: "У вузьких лінійних просторах бійці часто опиняються на одній лінії вогню." },
    { q: "Яку небезпечну ілюзію створює Г-подібна форма кімнати?", a: ["Ілюзію наявності двох дверей", "Ілюзію безпеки перед глибоким кутом", "Ілюзію порожнього центру"], c: 1, e: "Бійці часто розслабляються після зачистки видимої частини, забуваючи про 'мертву зону' за поворотом." },
    { q: "Що передбачає робота з центральним сектором (90°) під час нарізання кутів?", a: ["Швидке забігання в центр, щоб побачити всю кімнату", "Роботу лише з тим кутом, який видно, не забігаючи всередину", "Негайний відступ назад"], c: 1, e: "Центр — це найбільш прострілювана зона. Працюємо ззовні, поки кут не зачищено." },
    { q: "Як правильно тримати зброю у фазі 1 (вузький кут до 45°)?", a: ["Зброя має бути піднята максимально високо", "Зброя має бути злегка опущена, щоб полум'ягасник не видавав позицію", "Зброю слід тримати за спиною для скритності"], c: 1, e: "Це запобігає 'телеграфуванню' (коли ворог бачить ствол раніше за ваші очі)." },
    { q: "У чому полягає пастка 'зони 60°-90°'?", a: ["Кінець вашої зброї потрапляє в поле зору противника раніше, ніж ваші очі (телеграфування)", "Противник може заблокувати двері", "Ви втрачаєте з поля зору свого напарника"], c: 0, e: "На широких кутах довжина ствола стає вашим ворогом, якщо не контролювати позицію." },
    { q: "Що вимагає 'Правило 180°' при перевірці глибоких кутів?", a: ["Заходити в кімнату стрибком обома ногами", "Повністю переносити вагу тіла в центр кімнати", "Завжди робити крок всередину лише однією ногою та зберігати баланс"], c: 2, e: "Одна нога всередині дозволяє швидко відсахнутися назад у разі контакту." },
    { q: "Яка критична помилка найчастіше трапляється під час огляду сліпих зон (150°-180°)?", a: ["Занадто сильний нахил вперед ('летіти носом'), що призводить до втрати рівноваги", "Передчасне опускання зброї", "Занадто гучні кроки"], c: 0, e: "Втрата рівноваги при нахилі робить вас легкою і нерухомою мішенню." },
    { q: "Скільки глибоких кутів має кімната з центральним входом (Center-Fed)?", a: ["Один глибокий кут", "Два глибоких (180°) кути, які вимагають одночасної уваги", "Жодного глибокого кута"], c: 1, e: "Це найскладніший вхід, бо загроза знаходиться одночасно ліворуч і праворуч." },
    { q: "Яку тактичну перевагу дає кутовий вхід у кімнату (Corner-Fed)?", a: ["Дозволяє зайти одразу всій групі", "Дає змогу ігнорувати центр кімнати", "Наявність прилеглої стіни зменшує кількість невідомих змінних на 50%"], c: 2, e: "Ви одразу контролюєте одну зі стін, звужуючи сектор пошуку загрози." },
    { q: "Чому кімнату називають 'простою' (позитивною) під час діагностики?", a: ["Бо в ній немає дверей", "Стіну ідентифіковано вже на 45°, і увага перемикається на дальній кут", "Бо кімната порожня по центру"], c: 1, e: "Проста кімната дозволяє швидше завершити огляд за рахунок видимої стіни." },
    { q: "У чому полягає небезпека 'складної' (негативної) кімнати?", a: ["У ній завжди багато меблів", "Створюється ілюзію порожнього простору, підставляючи під удар з глибокого кута біля входу", "Двері відчиняються назовні"], c: 1, e: "Це пастка, де загроза ховається в куті, який ви бачите останнім." },
    { q: "Який об'єкт має найвищий пріоритет (№1) в ієрархії загроз приміщення?", a: ["Безпосередня загроза (люди зі зброєю)", "Відкриті простори", "Відкриті двері"], c: 0, e: "Людина — найнебезпечніша, бо вона мобільна і може атакувати миттєво." },
    { q: "Що має найнижчий пріоритет (№4) під час зачистки?", a: ["Глибокі кути", "Відкриті двері", "Зачинені двері"], c: 2, e: "Зачинені двері обмежують маневр ворога, тому їх перевіряють в останню чергу." },
    { q: "Яке головне завдання Ведучого (Pointman) під час роботи в двійці?", a: ["Закривати тил групи", "Фокусуватися на фронті та диктувати темп просування", "Перевіряти всі зачинені двері"], c: 1, e: "Перший номер — це очі групи, він визначає швидкість і напрямок руху." },
    { q: "За що відповідає Ведений (Wingman) у динаміці двійки?", a: ["Забезпечує безпеку на 360°, закриває фланги та контролює темп напарника", "Першим входить у кімнату", "Відповідає виключно за зв'язок"], c: 0, e: "Другий номер оберігає спину та фланги першого, створюючи 'купол безпеки'." },
    { q: "Що відбувається на фінальному етапі передачі кута (45-Degree Handover)?", a: ["Ведучий стріляє восліп", "Ведений залишається коридорі", "Ведений робить різкий хід на 90° і переймає ініціативу"], c: 2, e: "Це момент, коли другий номер стає ведучим для зачистки останнього сектору." },
    { q: "Як працює біомеханіка тактики Веденого при зустрічі із загрозою?", a: ["При переляку відсахнеться назад і тактильним контактом відведе Ведучого в безпеку", "Інстинктивно падає на підлогу", "Рефлекторно штовхає Ведучого вперед"], c: 0, e: "Це природна реакція, яка рятує обох, виводячи їх із лінії вогню одним рухом." },
    { q: "З яких фаз складається 'Цикл прийняття рішень' у геометрії CQB?", a: ["Забігання, Постріл, Перезарядка, Відступ", "Оцінка, Підхід, Проникнення, Пріоритезація", "Спостереження, Очікування, Розмова, Рух"], c: 1, e: "Кожен крок має бути усвідомленим: спочатку оцінюємо, потім діємо." },
    { q: "Що таке техніка 'нарізання пирога'?", a: ["Поступовий огляд кімнати шматочок за шматочком для мінімізації ризику", "Розподіл команди на частини", "Круговий обхід будівлі"], c: 0, e: "Ви бачите ворога раніше, ніж він побачить вас усім корпусом." },
    { q: "У чому полягає суть 'гібридного входу' в приміщення?", a: ["Використання різних гранат", "Повільний крок зі стрільбою", "Спокійний огляд половини кімнати ззовні з подальшим швидким входом"], c: 2, e: "Метод поєднує безпеку зовнішнього огляду та швидкість зачистки залишку кімнати." },
    { q: "Де знаходиться 'сильна сторона' (Strong Side) дверей?", a: ["З боку дверної ручки", "З боку дверних завіс / петель", "По центру дверей"], c: 1, e: "Сторона петель тактично складніша для огляду, тому вважається 'сильною'." },
    { q: "Як уникнути помилки 'телеграфування' при перетині кута?", a: ["Висувати спочатку ствол", "Тримати зброю ближче до тіла (очі та зброя одночасно)", "Пересуватися поповзом"], c: 1, e: "Важливо, щоб ви бачили ворога в той самий момент, коли ваша зброя націлена на нього." }
];

let currentMode = '';
let currentIdx = 0;
let score = 0;
let userName = '';
let activeQuestions = [];

function initQuiz(mode) {
    userName = document.getElementById('user-name').value.trim();
    if (userName.length < 3) return alert("Будь ласка, введіть Прізвище та Ім'я");

    if (mode === 'exam' && localStorage.getItem('exam_cqb_v1')) {
        alert("Ви вже склали цей залік!");
        showFinal(JSON.parse(localStorage.getItem('exam_cqb_v1')));
        return;
    }

    currentMode = mode;
    currentIdx = 0;
    score = 0;
    activeQuestions = [...baseQuestions].sort(() => Math.random() - 0.5);

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').classList.add('active');
    loadQuestion();
}

function loadQuestion() {
    const q = activeQuestions[currentIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('q-number').innerText = `${currentMode === 'exam' ? 'ЗАЛІК' : 'ТРЕНУВАННЯ'} • Питання ${currentIdx + 1} / ${activeQuestions.length}`;
    document.getElementById('progress').style.width = `${(currentIdx / activeQuestions.length) * 100}%`;
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    q.a.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = text;
        div.onclick = () => selectOption(i, div);
        container.appendChild(div);
    });
}

function selectOption(idx, el) {
    const q = activeQuestions[currentIdx];
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.add('locked'));

    if (idx === q.c) {
        el.classList.add('correct');
        score++;
    } else {
        el.classList.add('wrong');
        options[q.c].classList.add('correct');
    }

    if (currentMode === 'training') {
        const exp = document.getElementById('explanation');
        exp.innerText = q.e;
        exp.style.display = 'block';
    }
    document.getElementById('next-btn').style.display = 'block';
}

function loadNext() {
    currentIdx++;
    if (currentIdx < activeQuestions.length) {
        loadQuestion();
    } else {
        const result = { name: userName, score: `${score}/${activeQuestions.length}`, mode: currentMode, date: new Date().toLocaleString() };
        if (currentMode === 'exam') localStorage.setItem('exam_cqb_v1', JSON.stringify(result));
        showFinal(result);
    }
}

function showFinal(data) {
    document.getElementById('quiz-screen').classList.remove('active');
    document.getElementById('start-screen').style.display = 'none';
    const screen = document.getElementById('result-screen');
    screen.style.display = 'block';
    document.getElementById('res-user').innerText = data.name;
    document.getElementById('res-score').innerText = data.score;
    document.getElementById('res-info').innerText = `${data.mode === 'exam' ? 'Офіційний залік' : 'Тренування'} • ${data.date}`;
}
</script>
</body>
</html>
